# ===========================================================================
# Developer Portal backend — Quarkus configuration
# ===========================================================================

quarkus.application.name=developer-portal
quarkus.http.port=8080

# --- OpenAPI / Swagger ------------------------------------------------------
quarkus.smallrye-openapi.info-title=Developer Portal API
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# --- Datasource (PostgreSQL) ------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:portal}
quarkus.datasource.password=${DB_PASSWORD:portal}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/portal}
quarkus.hibernate-orm.database.generation=${DB_GENERATION:update}

# --- CORS (frontend calls the API from the browser) ------------------------
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:/.*/}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# --- Observability ----------------------------------------------------------
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.smallrye-health.root-path=/q/health

# --- RHCL integration layer -------------------------------------------------
# mode: mock (default, in-process) | kubernetes (drives real RHCL CRDs)
portal.rhcl.mode=${RHCL_MODE:mock}
portal.rhcl.namespace=${RHCL_NAMESPACE:rhcl-apps}
portal.rhcl.api-key-header=${RHCL_APIKEY_HEADER:api-key}
portal.rhcl.api-key-app-label=${RHCL_APIKEY_APP_LABEL:banking-api-apikey}
portal.rhcl.default-hostname=${RHCL_DEFAULT_HOSTNAME:}
# portal.rhcl.prometheus-url=${PROMETHEUS_URL:}

# Demo catalog seed (banking-api + plans) on first start.
portal.seed.enabled=${SEED_ENABLED:true}
portal.seed.hostname=${SEED_HOSTNAME:banking-api-connectivity.apps.example.com}

# ===========================================================================
# Production profile — OIDC enabled, /api/me & /api/admin require a token.
# ===========================================================================
%prod.quarkus.oidc.enabled=true
%prod.quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:https://keycloak.apps.example.com/realms/rhcl}
%prod.quarkus.oidc.application-type=service
%prod.quarkus.oidc.tls.verification=${OIDC_TLS_VERIFICATION:none}
%prod.quarkus.http.auth.permission.authenticated.paths=/api/me,/api/me/*,/api/admin,/api/admin/*
%prod.quarkus.http.auth.permission.authenticated.policy=authenticated
%prod.quarkus.http.auth.permission.public.paths=/api/catalog/*,/api/plans,/q/*
%prod.quarkus.http.auth.permission.public.policy=permit

# ===========================================================================
# Dev profile — OIDC off, dev identity from portal.dev.*; Postgres dev service.
# ===========================================================================
%dev.quarkus.oidc.enabled=false
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.portal.dev.username=alice
%dev.portal.dev.email=alice@acme.example
%dev.portal.dev.roles=api-consumer,api-admin,api-owner

# ===========================================================================
# Test profile — no external deps; mock RHCL; in-memory-ish via dev service.
# ===========================================================================
%test.quarkus.oidc.enabled=false
%test.portal.rhcl.mode=mock
%test.portal.seed.enabled=true
