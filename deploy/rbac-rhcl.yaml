# RBAC granting the portal backend SA (in rhcl-devportal) the rights to drive
# the RHCL DevPortal CRDs and Authorino API-key Secrets in the rhcl-apps
# namespace. Required only when RHCL_MODE=kubernetes.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: portal-rhcl-integration
  namespace: rhcl-apps
rules:
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apiproducts", "apikeys", "apikeyrequests", "apikeyapprovals"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["extensions.kuadrant.io"]
    resources: ["planpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: portal-rhcl-integration
  namespace: rhcl-apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: portal-rhcl-integration
subjects:
  - kind: ServiceAccount
    name: portal-backend
    namespace: rhcl-devportal
