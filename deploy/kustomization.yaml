apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Developer Portal — full stack (namespace, Postgres, backend, frontend, RBAC).
# Override images with `kustomize edit set image` or a patch.
resources:
  - namespace.yaml
  - postgres.yaml
  - backend.yaml
  - frontend.yaml
  - rbac-rhcl.yaml
  - rbac-monitoring.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: developer-portal
    includeSelectors: false
