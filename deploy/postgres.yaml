apiVersion: v1
kind: Secret
metadata:
  name: portal-db
  namespace: rhcl-devportal
type: Opaque
stringData:
  POSTGRES_DB: portal
  POSTGRES_USER: portal
  POSTGRES_PASSWORD: portal-changeme
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portal-db
  namespace: rhcl-devportal
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-db
  namespace: rhcl-devportal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-db
  template:
    metadata:
      labels:
        app: portal-db
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_DATABASE
              valueFrom: { secretKeyRef: { name: portal-db, key: POSTGRES_DB } }
            - name: POSTGRESQL_USER
              valueFrom: { secretKeyRef: { name: portal-db, key: POSTGRES_USER } }
            - name: POSTGRESQL_PASSWORD
              valueFrom: { secretKeyRef: { name: portal-db, key: POSTGRES_PASSWORD } }
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "portal"] }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: portal-db
---
apiVersion: v1
kind: Service
metadata:
  name: portal-db
  namespace: rhcl-devportal
spec:
  selector:
    app: portal-db
  ports:
    - port: 5432
      targetPort: 5432
